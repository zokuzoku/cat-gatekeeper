<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      font-family: sans-serif;
      padding: 16px;
      background: #1a1a1a;
      color: #fff;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 16px;
      text-align: center;
      color: #fff;
    }

    .section {
      margin-bottom: 16px;
    }

    .section label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .section input[type="number"] {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: #2e2e2e;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }

    .sns-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .sns-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .sns-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #ff6b35;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #ff6b35;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #e55a25;
    }

    #dismissBtn {
      background: #444;
      margin-bottom: 12px;
      display: none;
    }

    #dismissBtn:hover {
      background: #555;
    }

    .saved {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>🐱 Cat Gatekeeper</h1>

  <div class="section">
    <label data-i18n="usageLimitLabel"></label>
    <input type="number" id="usageLimit" min="1" max="480" value="60">
  </div>

  <div class="section">
    <label data-i18n="breakTimeLabel"></label>
    <input type="number" id="breakTime" min="1" max="60" value="5">
  </div>

  <div class="section">
    <label data-i18n="targetSNSLabel"></label>
    <div class="sns-list">
      <label class="sns-item"><input type="checkbox" id="sns-x" checked> X (Twitter)</label>
      <label class="sns-item"><input type="checkbox" id="sns-youtube" checked> YouTube</label>
      <label class="sns-item"><input type="checkbox" id="sns-facebook" checked> Facebook</label>
      <label class="sns-item"><input type="checkbox" id="sns-reddit" checked> Reddit</label>
      <label class="sns-item"><input type="checkbox" id="sns-threads" checked> Threads</label>
      <label class="sns-item"><input type="checkbox" id="sns-bluesky" checked> Bluesky</label>
    </div>
  </div>

  <button id="dismissBtn" data-i18n="dismissButton"></button>
  <button id="saveBtn" data-i18n="saveButton"></button>
  <div class="saved" id="savedMsg" data-i18n="savedMessage"></div>

  <script src="popup.js"></script>
</body>
</html>
